<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="8" fill="#f8f8f8"/>

  <!-- Client box -->
  <rect x="60" y="150" width="140" height="80" rx="8" fill="#111" stroke="#111" stroke-width="2"/>
  <text x="130" y="195" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">Client</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="190" x2="280" y2="190" stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="280,185 290,190 280,195" fill="#666"/>
  <text x="240" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">request</text>

  <!-- API Gateway -->
  <rect x="290" y="130" width="160" height="120" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="2"/>
  <text x="370" y="165" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#111" text-anchor="middle">API Gateway</text>
  <text x="370" y="185" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">auth · rate limit</text>
  <text x="370" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">validate · route</text>

  <!-- Arrow 2 -->
  <line x1="450" y1="170" x2="530" y2="140" stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="527,135 537,138 530,145" fill="#666"/>

  <line x1="450" y1="210" x2="530" y2="240" stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="527,245 537,242 530,235" fill="#666"/>

  <!-- Service 1 -->
  <rect x="540" y="90" width="140" height="70" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="2"/>
  <text x="610" y="122" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111" text-anchor="middle">Users Service</text>
  <text x="610" y="142" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">/api/users</text>

  <!-- Service 2 -->
  <rect x="540" y="200" width="140" height="70" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="2"/>
  <text x="610" y="232" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111" text-anchor="middle">Posts Service</text>
  <text x="610" y="252" font-family="system-ui,sans-serif" font-size="11" fill="#999" text-anchor="middle">/api/posts</text>

  <!-- Database -->
  <ellipse cx="720" cy="125" rx="35" ry="18" fill="#f0f0f0" stroke="#e5e5e5" stroke-width="2"/>
  <rect x="685" y="125" width="70" height="30" fill="#f0f0f0" stroke="#e5e5e5" stroke-width="2"/>
  <ellipse cx="720" cy="155" rx="35" ry="18" fill="#f0f0f0" stroke="#e5e5e5" stroke-width="2"/>
  <line x1="685" y1="125" x2="685" y2="155" stroke="#e5e5e5" stroke-width="2"/>
  <line x1="755" y1="125" x2="755" y2="155" stroke="#e5e5e5" stroke-width="2"/>
  <text x="720" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#999" text-anchor="middle">DB</text>

  <line x1="680" y1="125" x2="690" y2="125" stroke="#e5e5e5" stroke-width="2"/>

  <!-- Caption -->
  <text x="400" y="350" font-family="system-ui,sans-serif" font-size="13" fill="#bbb" text-anchor="middle">A simple API gateway pattern</text>
</svg>